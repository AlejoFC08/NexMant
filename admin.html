<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - NexMant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-header">
        <h1>Panel de Control - NexMant</h1>
        <p>Administración dinámica de contenidos en tiempo real</p>
    </div>

    <div class="container" style="margin-top: 30px;">
        <div class="admin-tabs">
            <button id="tab-servicios" class="btn-tab active" onclick="switchTab('servicios')">Gestionar Servicios</button>
            <button id="tab-trabajos" class="btn-tab" onclick="switchTab('trabajos')">Gestionar Galería de Trabajos</button>
        </div>
    </div>

    <div id="dashboard-servicios" class="dashboard">
        <div class="panel-form">
            <h3 id="form-titulo-servicios">Cargar Nuevo Servicio</h3>
            <form id="form-servicio">
                <div class="form-group">
                    <label for="titulo">Título del Servicio *</label>
                    <input type="text" id="titulo" class="form-control" required placeholder="Ej: Pintura de Fachadas">
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción *</label>
                    <textarea id="descripcion" class="form-control" rows="5" required placeholder="Detallá de qué trata el servicio..."></textarea>
                </div>
                <div class="form-group">
                    <label for="imagen">Imagen Representativa *</label>
                    <input type="file" id="imagen" class="form-control" accept="image/*" required>
                </div>
                <button type="submit" id="btn-guardar" class="btn-submit">Guardar Servicio</button>
            </form>
            <div id="mensaje"></div>
        </div>

        <div class="panel-lista">
            <h3>Servicios Activos</h3>
            <div id="lista-servicios-admin">
                <p style="color: #999; text-align: center;">Cargando servicios...</p>
            </div>
        </div>
    </div>

    <div id="dashboard-trabajos" class="dashboard" style="display: none;">
        <div class="panel-form">
            <h3>Cargar Trabajo Realizado</h3>
            <p style="font-size: 0.85rem; color: var(--color-secundario); margin-bottom: 15px;">Subí una foto directo de una obra terminada para alimentar el carrusel de la web.</p>
            <form id="form-trabajo">
                <div class="form-group">
                    <label for="imagen-trabajo">Foto del Trabajo Realizado *</label>
                    <input type="file" id="imagen-trabajo" class="form-control" accept="image/*" required>
                </div>
                <button type="submit" id="btn-guardar-trabajo" class="btn-submit">Guardar en Galería</button>
            </form>
            <div id="mensaje-trabajo"></div>
        </div>

        <div class="panel-lista">
            <h3>Fotos en la Galería</h3>
            <div id="lista-trabajos-admin">
                <p style="color: #999; text-align: center;">Cargando fotos...</p>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
